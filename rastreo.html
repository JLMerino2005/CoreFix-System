<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreFix | Rastrear mi Equipo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col">

    <nav class="navbar p-6 border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="logo text-2xl font-black italic">CORE<span class="text-blue-500">FIX</span></a>
            <a href="index.html" class="text-xs font-bold uppercase tracking-widest text-slate-500 hover:text-white transition">Volver</a>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-20 flex-grow flex flex-col items-center justify-center">
        <div class="max-w-md w-full text-center">
            <h2 class="text-4xl font-black mb-2 italic uppercase">Estado de <span class="text-blue-500">Reparación</span></h2>
            <p class="text-slate-500 text-sm mb-10 font-bold uppercase tracking-tighter">Consulta el avance de tu equipo en tiempo real</p>

            <div class="bg-slate-800 p-2 rounded-[2rem] border border-blue-500/20 shadow-2xl flex items-center mb-12">
                <input type="tel" id="searchPhone" placeholder="Tu número de WhatsApp..." class="bg-transparent border-none outline-none w-full px-6 py-3 text-white font-bold">
                <button onclick="buscarEstado()" class="bg-blue-600 p-4 rounded-[1.5rem] hover:bg-blue-500 transition-all shadow-lg shadow-blue-600/20">
                    <i class="fas fa-search"></i>
                </button>
            </div>

            <div id="resultContainer" class="hidden">
                </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
