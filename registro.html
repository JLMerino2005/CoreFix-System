<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreFix | Registro de Usuario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">
    <div class="bg-slate-800 p-10 rounded-[3rem] border border-blue-500/30 shadow-2xl w-full max-w-md relative">
        <div class="mb-6 text-left">
            <a href="index.html" class="text-xs uppercase tracking-widest text-slate-500 hover:text-white transition">
                <i class="fas fa-home mr-1"></i> Inicio
            </a>
        </div>

        <div class="text-center mb-6">
            <h2 class="text-3xl font-black italic">CREAR <span class="text-blue-500">CUENTA</span></h2>
            <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em] mt-1">Obtén tu garantía de 90 días</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Nombre Completo</label>
                <input type="text" id="regName" placeholder="Ej. Juan Pérez" class="input-pro" required>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Correo o WhatsApp</label>
                <input type="text" id="regEmail" placeholder="ejemplo@mail.com" class="input-pro" required>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Nueva Contraseña</label>
                <input type="password" id="regPass" placeholder="••••••••" class="input-pro" required>
            </div>
            <button type="submit" class="bg-blue-600 w-full py-4 rounded-2xl font-black hover:bg-blue-500 transition-all uppercase italic text-sm shadow-lg shadow-blue-600/20">Registrarme y Cotizar</button>
        </form>
        <p class="mt-6 text-center text-sm text-slate-500">¿Ya eres parte de CoreFix? <a href="login.html" class="text-blue-400 font-bold hover:underline">Inicia Sesión</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
