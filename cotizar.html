<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreFix | Cotizador Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-white font-sans">
    <nav class="navbar fixed w-full z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="logo text-2xl font-black italic tracking-tighter">CORE<span class="text-blue-500">FIX</span></a>
            <div id="auth-container"></div>
        </div>
    </nav>

    <main class="pt-32 pb-20 container mx-auto px-6">
        <div class="max-w-6xl mx-auto grid lg:grid-cols-3 gap-8">
            
            <div class="space-y-6 bg-slate-800/40 p-8 rounded-[2.5rem] border border-slate-700/50 shadow-xl">
                <div class="flex items-center gap-4 mb-4">
                    <span class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center font-black">1</span>
                    <h3 class="text-xl font-black italic uppercase tracking-tighter text-blue-400">Identificación</h3>
                </div>
                <div class="space-y-4">
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <input type="text" id="clientName" placeholder="Nombre Completo" class="input-pro w-full pl-12">
                    </div>
                    <div class="relative">
                        <i class="fab fa-whatsapp absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <input type="tel" id="clientPhone" placeholder="Número de WhatsApp" class="input-pro w-full pl-12">
                    </div>
                    <div class="relative">
                        <i class="fas fa-mobile-alt absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <input type="text" id="clientBrand" placeholder="Marca (Ej. Samsung, Apple)" class="input-pro w-full pl-12">
                    </div>
                    <div class="relative">
                        <i class="fas fa-info-circle absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <input type="text" id="clientModel" placeholder="Modelo (Ej. S22 Ultra, iPhone 11)" class="input-pro w-full pl-12">
                    </div>
                </div>
            </div>

            <div class="space-y-6 bg-slate-800/40 p-8 rounded-[2.5rem] border border-slate-700/50 shadow-xl">
                <div class="flex items-center gap-4 mb-4">
                    <span class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center font-black">2</span>
                    <h3 class="text-xl font-black italic uppercase tracking-tighter text-blue-400">Diagnóstico</h3>
                </div>
                <div class="space-y-4">
                    <select id="damageType" class="input-pro w-full font-bold" onchange="updatePrice()">
                        <option value="0">--- SELECCIONAR FALLA ---</option>
                        <option value="1300">Pantalla Quebrada</option>
                        <option value="550">Batería Agotada</option>
                        <option value="350">Centro de Carga</option>
                        <option value="700">Software / Desbloqueo</option>
                    </select>
                    
                    <select id="deliveryPoint" class="input-pro w-full text-xs">
                        <option value="Xochitlán">📍 Sucursal Xochitlán Todos Santos</option>
                        <option value="Tepexi">📍 Sucursal Tepexi de Rodriguez</option>
                    </select>

                    <div class="p-4 rounded-2xl border border-red-500/20 bg-red-500/5 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-bolt text-red-500 animate-pulse"></i>
                            <div>
                                <p class="text-[9px] font-black text-red-500 uppercase italic">Modo Express</p>
                                <p class="text-[8px] text-slate-500 uppercase">Prioridad Alta (+20%)</p>
                            </div>
                        </div>
                        <input type="checkbox" id="expressMode" onchange="updatePrice()" class="w-5 h-5 accent-red-500 cursor-pointer">
                    </div>
                </div>
            </div>

            <div class="space-y-6 bg-blue-600 p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden group">
                <div class="relative z-10 flex flex-col h-full justify-between">
                    <div class="text-center mb-6">
                        <p class="text-xs font-black uppercase text-blue-100 italic tracking-widest">Inversión Estimada</p>
                        <div class="text-7xl font-black my-2 drop-shadow-2xl">$<span id="priceDisplay">0</span></div>
                    </div>

                    <div class="space-y-4">
                        <div class="flex flex-col items-center">
                            <input type="file" id="photoBefore" accept="image/*" capture="camera" class="hidden" onchange="previewImage(this)">
                            <label for="photoBefore" class="w-full bg-white/10 hover:bg-white/20 border border-white/30 py-3 rounded-2xl text-[10px] font-black uppercase cursor-pointer transition flex items-center justify-center gap-2">
                                <i class="fas fa-camera"></i> Foto del Equipo
                            </label>
                            <img id="beforePreview" class="hidden w-24 h-24 object-cover rounded-xl mt-3 border-2 border-white/50 shadow-lg">
                        </div>

                        <button onclick="aceptarCotizacion()" class="w-full bg-white text-slate-900 font-black py-5 rounded-[2rem] hover:scale-105 active:scale-95 transition-all shadow-2xl uppercase italic tracking-tighter mt-4">
                            Aceptar y Generar Ticket <i class="fas fa-chevron-right ml-2"></i>
                        </button>
                    </div>
                </div>
                <i class="fas fa-shield-alt absolute -bottom-10 -right-10 text-9xl text-white/5 rotate-12"></i>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        function previewImage(input) {
            const preview = document.getElementById('beforePreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { preview.src = e.target.result; preview.classList.remove('hidden'); }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
