<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreFix | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">
    <div class="bg-slate-800 p-10 rounded-[2.5rem] border border-blue-500/30 shadow-2xl w-full max-w-md">
        <div class="mb-6 text-left">
            <a href="index.html" class="text-xs uppercase tracking-widest text-slate-500 hover:text-white transition"><i class="fas fa-chevron-left mr-1"></i> Inicio</a>
        </div>
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black italic">CORE<span class="text-blue-500">FIX</span></h1>
            <p class="text-slate-500 text-xs uppercase tracking-widest">Acceso Seguro</p>
        </div>
        <form id="loginForm" class="space-y-4">
            <div class="flex gap-4 mb-6">
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="userRole" value="admin" class="hidden peer" checked>
                    <div class="p-3 text-center rounded-xl border border-slate-700 peer-checked:border-blue-500 peer-checked:bg-blue-500/10 transition">
                        <i class="fas fa-user-shield block mb-1"></i> <span class="text-[10px] font-bold uppercase">Admin</span>
                    </div>
                </label>
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="userRole" value="user" class="hidden peer">
                    <div class="p-3 text-center rounded-xl border border-slate-700 peer-checked:border-blue-500 peer-checked:bg-blue-500/10 transition">
                        <i class="fas fa-user block mb-1"></i> <span class="text-[10px] font-bold uppercase">Usuario</span>
                    </div>
                </label>
            </div>
            
            <input type="text" id="logEmail" placeholder="Correo o Teléfono" class="input-pro" required>
            
            <div class="relative">
                <input type="password" id="logPass" placeholder="Contraseña" class="input-pro w-full pr-12" required>
                <button type="button" onclick="togglePassword('logPass', 'eyeIcon')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-blue-500 transition-colors">
                    <i id="eyeIcon" class="fas fa-eye"></i>
                </button>
            </div>

            <button type="submit" class="bg-blue-600 w-full py-4 rounded-2xl font-black hover:bg-blue-500 transition-all uppercase text-sm italic">Entrar</button>
        </form>
        <div class="text-center mt-4">
            <button onclick="recuperarPass()" class="text-[10px] text-slate-500 uppercase font-black hover:text-blue-400 transition-all">¿Olvidaste tu contraseña?</button>
        </div>
        <p class="mt-6 text-center text-sm text-slate-500">¿Nuevo? <a href="registro.html" class="text-blue-400 font-bold">Crea tu cuenta</a></p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
