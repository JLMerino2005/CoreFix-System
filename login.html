<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COREFIX | Login Administrador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-white font-sans flex items-center justify-center min-h-screen p-4">

    <div class="bg-slate-800 p-8 rounded-2xl max-w-sm w-full shadow-2xl border border-slate-700 relative">
        <a href="index.html" class="absolute top-4 left-4 text-xs text-azulCielo font-semibold hover:underline">← Volver al inicio</a>
        
        <div class="text-center mt-4 mb-6">
            <img src="img/Logo.png" alt="Logo COREFIX" class="h-24 w-24 mx-auto mb-4 object-cover rounded-full bg-white border-2 border-azulCielo">
            <p class="text-xs text-slate-400">Acceso exclusivo para el administrador</p>
        </div>

        <form id="form-login" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-300 mb-1">Usuario</label>
                <input type="text" id="login-user" class="w-full bg-slate-700 border border-slate-600 p-2.5 rounded-lg outline-none text-white focus:border-azulCielo" required placeholder="Introduce tu usuario">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-300 mb-1">Contraseña</label>
                <input type="password" id="login-pass" class="w-full bg-slate-700 border border-slate-600 p-2.5 rounded-lg outline-none text-white focus:border-azulCielo" required placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-azulCielo text-slate-900 py-2.5 rounded-lg font-bold hover:bg-white transition shadow duration-200">Iniciar Sesión</button>
        </form>
    </div>

    <script src="script.js"></script>
    <script>
        // Lógica específica para redirección en la vista de login
        document.getElementById("form-login").addEventListener("submit", (e) => {
            e.preventDefault();
            const user = document.getElementById("login-user").value;
            const pass = document.getElementById("login-pass").value;

            if (user === "JoseLuis" && pass === "CoreFix2026") {
                sessionStorage.setItem("corefix_session", "activa");
                window.location.href = "admin.html";
            } else {
                alert("Usuario o contraseña incorrectos.");
            }
        });
    </script>
</body>
</html>
