<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreFix | Panel de Administración</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen">

    <nav class="navbar bg-slate-800/50 backdrop-blur-md border-b border-blue-500/30 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic tracking-tighter">CORE<span class="text-blue-500">FIX</span> <span class="text-xs uppercase font-bold text-slate-500 ml-2 tracking-widest">Admin Control</span></h1>
            <a href="index.html" class="text-xs font-black bg-slate-700 px-6 py-2.5 rounded-full hover:bg-slate-600 transition-all border border-slate-600 uppercase">Cerrar Sesión</a>
        </div>
    </nav>

    <main class="container mx-auto py-10 px-6">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
            <div>
                <h2 class="text-5xl font-black italic uppercase tracking-tighter">Gestión de <span class="text-blue-500">Servicios</span></h2>
                <p class="text-slate-500 font-bold mt-2 uppercase text-[10px] tracking-[0.3em]">Xochitlán & Tepexi Dashboard</p>
            </div>
            
            <div class="bg-slate-800 border border-green-500/30 p-6 rounded-[2.5rem] flex items-center gap-6 shadow-[0_0_30px_rgba(34,197,94,0.1)]">
                <div class="bg-green-500/20 p-4 rounded-3xl">
                    <i class="fas fa-wallet text-2xl text-green-500"></i>
                </div>
                <div>
                    <p class="text-[10px] uppercase text-slate-500 font-black tracking-widest mb-1">Caja Proyectada</p>
                    <h4 class="text-4xl font-black text-green-400" id="totalMoney">$0</h4>
                </div>
            </div>
        </div>

        <div class="mb-8 bg-slate-800 p-4 rounded-3xl border border-blue-500/20 shadow-xl flex items-center gap-4">
            <i class="fas fa-search text-blue-500 ml-2"></i>
            <input type="text" id="adminSearch" placeholder="BUSCAR CLIENTE, FOLIO O FALLA EN XOCHITLÁN/TEPEXI..." 
                   class="bg-transparent border-none outline-none w-full text-sm font-bold uppercase tracking-widest text-white placeholder:text-slate-600"
                   onkeyup="filterAdminTable()">
        </div>

        <div class="bg-slate-800/50 rounded-[3rem] overflow-hidden border border-slate-700 shadow-2xl backdrop-blur-sm mb-12">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-700/30 text-blue-400 text-[10px] uppercase tracking-[0.2em] border-b border-slate-700">
                        <tr>
                            <th class="p-8">ID / Fecha</th>
                            <th class="p-8">Cliente</th>
                            <th class="p-8">Servicio / Zona</th>
                            <th class="p-8">Costo</th>
                            <th class="p-8 text-center">Estado</th>
                            <th class="p-8 text-right">Acciones de Control</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody" class="divide-y divide-slate-700/50 text-slate-300">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-slate-800 p-8 rounded-[2.5rem] border border-blue-500/20 shadow-2xl">
                <h3 class="text-lg font-black italic uppercase mb-6 text-blue-400">
                    <i class="fas fa-chart-pie mr-2"></i> Análisis de Fallas Comunes
                </h3>
                <div id="statsContainer" class="space-y-4 text-xs font-bold uppercase tracking-widest">
                    <p class="text-slate-600 italic">Procesando datos...</p>
                </div>
            </div>

            <div id="evidencePanel" class="hidden bg-blue-600 p-8 rounded-[2.5rem] shadow-2xl animate-pulse">
                <h3 class="text-lg font-black italic uppercase mb-4 text-white">Subir Foto Final</h3>
                <p class="text-[10px] text-blue-100 mb-4 font-bold">CARGANDO PARA: <span id="activeFolio">---</span></p>
                <input type="file" id="photoAfter" accept="image/*" capture="camera" class="hidden" onchange="uploadAfterPhoto(this)">
                <label for="photoAfter" class="w-full flex items-center justify-center gap-3 bg-white text-blue-600 py-4 rounded-2xl font-black uppercase text-xs cursor-pointer hover:scale-105 transition-transform">
                    <i class="fas fa-camera"></i> Tomar Foto del Equipo Listo
                </label>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const stats = obtenerEstadisticas();
                const container = document.getElementById('statsContainer');
                if (Object.keys(stats).length > 0) {
                    container.innerHTML = Object.entries(stats).map(([falla, total]) => `
                        <div class="flex justify-between border-b border-white/5 pb-2 hover:text-blue-400 transition-colors">
                            <span>${falla}</span>
                            <span class="text-blue-500">${total} servicios</span>
                        </div>`).join('');
                } else {
                    container.innerHTML = '<p class="text-slate-500 uppercase italic">Sin datos aún.</p>';
                }
            }, 500);
        });

        // Abrir panel para subir foto del equipo terminado
        function showEvidencePanel(id) {
            document.getElementById('activeFolio').innerText = id;
            document.getElementById('evidencePanel').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function uploadAfterPhoto(input) {
            const id = document.getElementById('activeFolio').innerText;
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    let logs = JSON.parse(localStorage.getItem('cotizaciones'));
                    const i = logs.findIndex(l => l.id === id);
                    if(i !== -1) {
                        logs[i].fotoDespues = e.target.result;
                        localStorage.setItem('cotizaciones', JSON.stringify(logs));
                        alert("✅ Foto final guardada. El cliente ya puede verla.");
                        document.getElementById('evidencePanel').classList.add('hidden');
                        renderAdminTable();
                    }
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
