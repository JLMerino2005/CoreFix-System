<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreFix | Mi Ticket Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen p-4 font-sans">

    <div id="ticket" class="bg-white text-slate-900 p-8 rounded-[2.5rem] shadow-2xl max-w-sm w-full relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
        
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black tracking-tighter uppercase">CORE<span class="text-blue-600">FIX</span></h1>
            <p class="text-[10px] uppercase font-bold text-slate-400 italic">Comprobante de Servicio Ingeniería</p>
        </div>

        <div class="flex justify-center bg-slate-50 p-4 rounded-2xl mb-6 border border-slate-100 shadow-inner">
            <div id="qrcode"></div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-4">
            <div class="text-center">
                <p class="text-[7px] font-black uppercase text-slate-400 mb-1">Estado Inicial</p>
                <img id="viewBefore" class="w-full h-20 object-cover rounded-lg border border-slate-100 bg-slate-50">
            </div>
            <div class="text-center">
                <p class="text-[7px] font-black uppercase text-blue-500 mb-1">Resultado</p>
                <div id="afterPlaceholder" class="w-full h-20 rounded-lg border border-dashed border-slate-200 flex items-center justify-center text-[7px] text-slate-300 font-bold uppercase p-2 text-center">En Proceso</div>
                <img id="viewAfter" class="hidden w-full h-20 object-cover rounded-lg border border-green-200">
            </div>
        </div>

        <div class="border-y border-dashed border-slate-300 py-4 my-4 space-y-2">
            <div class="flex justify-between text-[11px]"><span class="text-slate-500 font-bold">FOLIO:</span><span id="folioNum" class="font-black text-blue-600">#---</span></div>
            <div class="flex justify-between text-[11px]"><span class="text-slate-500 font-bold">CLIENTE:</span><span id="orderClient" class="font-bold uppercase">---</span></div>
            <div class="flex justify-between text-[11px]"><span class="text-slate-500 font-bold">SERVICIO:</span><span id="orderService" class="font-bold italic">---</span></div>
        </div>

        <div class="text-center py-4">
            <p class="text-[10px] text-slate-500 font-bold uppercase">Inversión Total</p>
            <h2 class="text-5xl font-black tracking-tighter" id="orderTotal">$0</h2>
        </div>

        <div class="bg-slate-900 text-white p-5 rounded-3xl text-[9px] space-y-2 mb-6">
            <div class="flex items-center gap-2 border-b border-white/10 pb-2 mb-1">
                <i class="fas fa-shield-alt text-blue-400"></i>
                <p class="font-black uppercase">Garantía Real: 90 Días</p>
            </div>
            <p class="text-blue-300 font-bold text-center">Vence: <span id="warrantyDate">--/--/--</span></p>
        </div>

        <div class="space-y-3">
            <button onclick="enviarTicketWhatsApp()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black text-xs uppercase hover:bg-green-400 transition-all shadow-lg flex items-center justify-center gap-2">
                <i class="fab fa-whatsapp text-lg"></i> WhatsApp
            </button>
            <button onclick="window.print()" class="w-full bg-slate-900 text-white py-3 rounded-2xl font-black text-[10px] uppercase">Descargar</button>
        </div>
        
        <a href="index.html" class="block text-center mt-6 text-[10px] font-bold text-slate-400 uppercase">Volver al inicio</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const lastOrder = JSON.parse(localStorage.getItem('currentOrder'));
            if(lastOrder) {
                document.getElementById('folioNum').innerText = lastOrder.id;
                document.getElementById('orderClient').innerText = lastOrder.nombre;
                document.getElementById('orderService').innerText = lastOrder.falla;
                document.getElementById('orderTotal').innerText = `$${lastOrder.precio}`;
                
                if(lastOrder.fotoAntes) document.getElementById('viewBefore').src = lastOrder.fotoAntes;
                if(lastOrder.fotoDespues) {
                    document.getElementById('viewAfter').src = lastOrder.fotoDespues;
                    document.getElementById('viewAfter').classList.remove('hidden');
                    document.getElementById('afterPlaceholder').classList.add('hidden');
                }

                const fecha = new Date(); fecha.setDate(fecha.getDate() + 90);
                document.getElementById('warrantyDate').innerText = fecha.toLocaleDateString();

                new QRCode(document.getElementById("qrcode"), {
                    text: lastOrder.id, width: 140, height: 140, colorDark : "#0f172a", colorLight : "#f8fafc"
                });
            }
        });

        function enviarTicketWhatsApp() {
            const last = JSON.parse(localStorage.getItem('currentOrder'));
            const msj = `*COREFIX - TICKET DIGITAL*%0A*Folio:* ${last.id}%0A*Servicio:* ${last.falla}%0A*Total:* $${last.precio}%0A📍 *Entrega:* ${last.ubicacion}`;
            window.open(`https://wa.me/${last.telefono}?text=${msj}`, '_blank');
        }
    </script>
</body>
</html>
